    .progress-bar-inner {

    .intro-badge {

    .intro-title {

      min-height: 90px;

    select {

      background-repeat: no-repeat;
      background-position: right 14px center;
      padding-right: 40px;
    }

    select option {
      background: var(--surface2);
      color: var(--text);
    }

    .options-list {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .option-item {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 12px 16px;
      background: rgba(255, 255, 255, 0.03);
      border: 1.5px solid rgba(255, 255, 255, 0.07);
      border-radius: 10px;
      cursor: pointer;
      transition: all .2s;
      font-size: 14px;
      color: var(--text-muted);
      user-select: none;
    }

    .option-item:hover {
      border-color: rgba(108, 99, 255, 0.4);
      background: rgba(108, 99, 255, 0.06);
      color: var(--text);
    }

    .option-item input[type=radio],
    .option-item input[type=checkbox] {
      display: none;
    }

    .option-item .dot {
      width: 18px;
      height: 18px;
      border: 2px solid rgba(255, 255, 255, 0.2);
      border-radius: 50%;
      flex-shrink: 0;
      transition: all .2s;
      position: relative;
    }

    .option-item input[type=checkbox]+.dot {
      border-radius: 5px;
    }

    .option-item.selected {
      border-color: var(--primary);
      background: rgba(108, 99, 255, 0.12);
      color: var(--text);
    }

    .option-item.selected .dot {
      background: var(--primary);
      border-color: var(--primary);
    }

    .option-item.selected .dot::after {
      content: '';
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 6px;
      height: 6px;
      background: #fff;
      border-radius: 50%;
    }

    .option-item.selected input[type=checkbox]+.dot::after {
      content: '✓';
      font-size: 11px;
      font-weight: 700;
      border-radius: 0;
      width: auto;
      height: auto;
      background: transparent;
      color: #fff;
    }

    .fields-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
    }

    @media(max-width:560px) {
      .fields-row {
        grid-template-columns: 1fr
      }

      .card-inner {
        padding: 24px 20px
      }

      .intro-title {
        font-size: 20px
      }
    }

    .btn-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-top: 32px;
      gap: 12px;
    }

    .btn {
      padding: 14px 32px;
      border-radius: var(--radius);
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
      border: none;
      transition: all .2s;
      font-family: 'Inter', sans-serif;
    }

    .btn-primary {
      background: linear-gradient(135deg, var(--primary), var(--primary-dark));
      color: #fff;
      box-shadow: 0 4px 20px rgba(108, 99, 255, 0.4);
      flex: 1;
    }

    .btn-primary:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 28px rgba(108, 99, 255, 0.5);
    }

    .btn-primary:active {
      transform: translateY(0);
    }

    .btn-secondary {
      background: rgba(255, 255, 255, 0.07);
      color: var(--text-muted);
      border: 1px solid var(--border);
    }

    .btn-secondary:hover {
      background: rgba(255, 255, 255, 0.12);
      color: var(--text);
    }

    .btn:disabled {
      opacity: .5;
      cursor: not-allowed;
      transform: none !important;
    }

    .success-wrap {
      text-align: center;
      padding: 20px 0;
    }

    .success-icon {
      font-size: 64px;
      margin-bottom: 20px;
      animation: pop .5s cubic-bezier(.2, 1.6, .6, 1);
    }

    @keyframes pop {
      from {
        transform: scale(0)
      }

      to {
        transform: scale(1)
      }
    }

    .success-title {
      font-size: 26px;
      font-weight: 800;
      margin-bottom: 12px;
      color: #fff;
    }

    .success-desc {
      color: var(--text-muted);
      font-size: 15px;
      line-height: 1.7;
    }

    .field-error {
      color: var(--error);
      font-size: 12px;
      margin-top: 5px;
      display: none;
    }

    .field-error.show {
      display: block;
    }

    .loading-spin {
      display: inline-block;
      width: 18px;
      height: 18px;
      border: 2px solid rgba(255, 255, 255, 0.3);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin .7s linear infinite;
      margin-right: 8px;
      vertical-align: middle;
    }

    @keyframes spin {
      to {
        transform: rotate(360deg)
      }
    }

    .branch-tag {
      display: inline-block;
      padding: 4px 12px;
      background: rgba(108, 99, 255, 0.15);
      border: 1px solid rgba(108, 99, 255, 0.3);
      border-radius: 100px;
      font-size: 11px;
      font-weight: 700;
      color: var(--primary-light);
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-bottom: 16px;
    }

    .other-input-wrap {
      margin-top: 10px;
      display: none;
    }

    .other-input-wrap.show {
      display: block;
    }
  </style>
</head>

<body>

  <div class="header">
    <div class="header-inner">
      <div class="logo">SYNITY</div>
      <div class="logo-sub">Digital Transformation</div>
    </div>
  </div>

  <div class="progress-wrap" id="progressWrap" style="display:none">
    <div class="progress-bar-outer">
      <div class="progress-bar-inner" id="progressBar" style="width:0%"></div>
    </div>
    <div class="progress-info"><span id="progressLabel">Bước 1</span><span id="progressPct">0%</span></div>
  </div>

  <div class="card">
    <div class="card-inner" id="mainCard"></div>
  </div>

  <script>
    // ============================================================
    // ⚠️ ĐỔI URL NÀY thành URL Deploy của Apps Script
    // Sau khi deploy Code.gs lên Apps Script, copy URL exec vào đây
    // ============================================================
    var APPS_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbwphhFKbw_1UiAWL4FKo0gisGJLCJmAzFY6dQQTVqgMb5dWu1V7Kq4pvGg3UFvQrNDi/exec';

    var state = { step: 0, branch: null, data: {} };
    var TOTAL_STEPS = 6;

    function getProgressPct() { return state.step === 0 ? 0 : Math.round((state.step / (TOTAL_STEPS - 1)) * 100); }

    function render() {
      var card = document.getElementById('mainCard');
      var prog = document.getElementById('progressWrap');
      prog.style.display = state.step === 0 ? 'none' : 'block';
      document.getElementById('progressBar').style.width = getProgressPct() + '%';
      document.getElementById('progressLabel').textContent = 'Bước ' + state.step + ' / ' + (TOTAL_STEPS - 1);
      document.getElementById('progressPct').textContent = getProgressPct() + '%';
      var html = '';
      switch (state.step) {
        case 0: html = renderIntro(); break;
        case 1: html = renderContact(); break;
        case 2: html = renderBusiness(); break;
        case 3: html = renderOperations(); break;
        case 4: html = renderBranch(); break;
        case 5: html = renderSuccess(); break;
        default: html = renderIntro();
      }
      card.innerHTML = html;
      attachListeners();
      window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    function renderIntro() {
      return '<div class="intro-badge">🚀 Khảo sát miễn phí</div>' +
        '<div class="intro-title">Khảo sát nhu cầu<br>chuyển đổi số doanh nghiệp</div>' +
        '<div class="intro-desc"><strong>Chào mừng anh chị đến với SYNITY!</strong></div>' +
        '<div class="intro-desc">SYNITY mong muốn mang đến những góc nhìn tư vấn phù hợp và sát với nhu cầu thực tế của doanh nghiệp, tương xứng với thời gian anh chị đã dành cho chúng tôi. Vì vậy, rất mong anh chị dành ít phút để hoàn thành các câu hỏi dưới đây.</div>' +
        '<div class="intro-desc">Những thông tin anh chị cung cấp sẽ là dữ liệu quan trọng giúp SYNITY thực hiện khảo sát sơ bộ và chuẩn bị phương án tư vấn/demo phù hợp nhất với tình hình doanh nghiệp.</div>' +
        '<div class="intro-desc"><em>Trân trọng cảm ơn anh chị đã tin tưởng và liên hệ với SYNITY.</em></div>' +
        '<button class="btn btn-primary" style="width:100%" onclick="nextStep()">Bắt đầu khảo sát →</button>';
    }
    function feat(icon, text) { return '<div class="intro-feat"><span class="icon">' + icon + '</span>' + text + '</div>'; }

    function renderContact() {
      return sectionHeader('1', 'Thông tin liên hệ', 'Để chúng tôi có thể liên hệ tư vấn phù hợp với bạn') +
        fieldsRow(textField('hoTen', 'Họ tên', true, state.data.hoTen || ''), selectField('danhXung', 'Danh xưng', true, ['Anh', 'Chị'], state.data.danhXung || '')) +
        textField('email', 'Email', true, state.data.email || '', 'email') +
        textField('phone', 'Số điện thoại', true, state.data.phone || '', 'tel') +
        textField('facebook', 'Facebook cá nhân', false, state.data.facebook || '', 'text', 'Vui lòng điền link Facebook cá nhân của anh/chị') +
        selectField('vaiTro', 'Vai trò', true, ['Chủ sở hữu', 'Giám đốc khối', 'Trưởng phòng', 'Chuyên gia/Chuyên viên'], state.data.vaiTro || '') +
        radioField('bietDen', 'Anh/chị biết đến SYNITY (hoặc Chinh Dang) từ đâu?', true,
          ['Facebook Chinh Dang', 'Bạn bè giới thiệu', 'Google Search', 'Mục khác'], state.data.bietDen || '') +
        otherField('bietDen', 'Mục khác', state.data.bietDenKhac || '') +
        btnRow(null, 'Tiếp theo →', true);
    }

    function renderBusiness() {
      return sectionHeader('2', 'Thông tin doanh nghiệp', 'Giúp chúng tôi hiểu hơn về quy mô và ngành hoạt động') +
        textField('tenDN', 'Tên doanh nghiệp', false, state.data.tenDN || '') +
        textField('maSoThue', 'Mã số thuế doanh nghiệp', true, state.data.maSoThue || '') +
        textField('website', 'Website hoặc Facebook công ty', false, state.data.website || '', 'text', 'Nếu không có, vui lòng điền "không có"') +
        selectField('soNhanSu', 'Số lượng nhân sự', true, ['0 - 5', '6 - 50', '51 - 100', '101 - 250', '251 - 500', '501 - 1000', '1000+'], state.data.soNhanSu || '') +
        selectField('nganhNghe', 'Ngành nghề', true,
          ['Giáo dục - Đào tạo', 'Thương mại', 'Bán lẻ', 'Spa Beauty', 'Nha khoa', 'Cơ sở chăm sóc sức khoẻ', 'Bất Động Sản', 'Bảo Hiểm', 'Tài Chính', 'Dịch vụ chuyên nghiệp', 'Du lịch lữ hành', 'Khác'],
          state.data.nganhNghe || '') +
        textField('doanhThu', 'Doanh thu trung bình năm (tỷ/năm)', true, state.data.doanhThu || '') +
        btnRow('← Quay lại', 'Tiếp theo →', true);
    }

    function renderOperations() {
      return sectionHeader('3', 'Thực trạng vận hành & Giải pháp', 'Phân tích hiện trạng và định hướng giải pháp phù hợp') +
        checkboxField('khoKhan', 'Những khó khăn lớn nhất trong vận hành?', true,
          ['Quản lý khách hàng rời rạc', 'Mất dữ liệu', 'Khó theo dõi hiệu suất', 'Quy trình thiếu đồng bộ', 'Phối hợp phòng ban chưa hiệu quả', 'Mục khác'],
          state.data.khoKhan || []) +
        otherField('khoKhan', 'Khó khăn khác', state.data.khoKhanKhac || '') +
        textField('vanDeCapBach', 'Vấn đề cấp bách nhất cần giải quyết trong 3 tháng tới?', true, state.data.vanDeCapBach || '') +
        textareaField('congCuHienTai', 'Công cụ/Phần mềm hiện đang sử dụng?', true, state.data.congCuHienTai || '', 'CRM, giao việc, kế toán, CSKH, Marketing…') +
        textareaField('haiLong', 'Điều hài lòng nhất với công cụ hiện tại?', true, state.data.haiLong || '') +
        textareaField('chuaHaiLong', 'Điều chưa hài lòng hoặc còn hạn chế?', true, state.data.chuaHaiLong || '') +
        textareaField('kyVong', 'Kỳ vọng hệ thống mới cải thiện điều gì rõ rệt nhất?', true, state.data.kyVong || '') +
        textareaField('tieuChi', 'Tiêu chí quan trọng nhất khi lựa chọn đơn vị đồng hành?', true, state.data.tieuChi || '') +
        checkboxField('giaiPhapQuanTam', 'Các giải pháp quan tâm của SYNITY?', false,
          ['01. Cộng tác nội bộ', '02. Hồ sơ khách hàng 360', '03. Hợp nhất kênh truyền thông',
            '04. Chuẩn hoá chốt sale', '05. Quản lý thanh toán', '06. Hoá đơn VAT',
            '07. Đo lường quảng cáo', '08. Quản lý Booking', '09. Đồng bộ Facebook Dataset',
            '10. Báo cáo BI', '11. Quy trình phê duyệt', '12. AI Agent', '13. Văn phòng không giấy', 'Mục khác'],
          state.data.giaiPhapQuanTam || []) +
        otherField('giaiPhapQuanTam', 'Giải pháp khác', state.data.giaiPhapKhac || '') +
        radioField('nhomGiaiPhap', 'Nhóm giải pháp quan tâm hiện tại?', true,
          ['(Full hệ thống) Giải pháp quản trị tổng thể doanh nghiệp',
            '(CRM) Giải pháp quản lý khách hàng & bán hàng',
            '(Task) Giải pháp quản lý công việc & quy trình'],
          state.data.nhomGiaiPhap || '') +
        btnRow('← Quay lại', 'Tiếp theo →', true);
    }

    function renderBranch() {
      var nhom = state.data.nhomGiaiPhap || '';
      if (nhom.indexOf('Full') !== -1) { state.branch = 'full'; return renderBranchFull(); }
      if (nhom.indexOf('CRM') !== -1) { state.branch = 'crm'; return renderBranchCRM(); }
      if (nhom.indexOf('Task') !== -1) { state.branch = 'task'; return renderBranchTask(); }
      return renderBranchFull();
    }

    function renderBranchFull() {
      return '<div class="branch-tag">🏢 Full Hệ Thống</div>' +
        sectionHeader('4', 'Hệ thống quản trị toàn diện', 'Khảo sát chuyên sâu về nhu cầu triển khai hệ thống tổng thể') +
        checkboxField('boPhanSoHoa', 'Bộ phận muốn số hóa?', true, ['Bán hàng', 'Marketing', 'CSKH', 'Vận hành', 'Nhân sự', 'Kế toán', 'Khác'], state.data.boPhanSoHoa || []) +
        otherField('boPhanSoHoa', 'Bộ phận khác', state.data.boPhanKhac || '') +
        radioField('quyTrinhChuan', 'Đã có quy trình chuẩn chưa?', true, ['Đã có nhưng chưa số hóa', 'Đang vận hành theo kinh nghiệm', 'Chưa có quy trình rõ ràng'], state.data.quyTrinhChuan || '') +
        radioField('sanSangThayDoi', 'Mức độ sẵn sàng thay đổi của nhân sự?', true, ['Rất sẵn sàng', 'Cần đào tạo thêm', 'Còn e ngại'], state.data.sanSangThayDoi || '') +
        radioField('kyVongThayDoi', 'Kỳ vọng thay đổi rõ nhất?', true, ['Giảm phụ thuộc cá nhân', 'Mở rộng quy mô', 'Kiểm soát chi phí', 'Tăng năng suất', 'Phối hợp dễ dàng hơn', 'Mục khác'], state.data.kyVongThayDoi || '') +
        otherField('kyVongThayDoi', 'Kỳ vọng khác', state.data.kyVongThayDoiKhac || '') +
        textareaField('mucTieuToanDien', 'Mục tiêu lớn nhất khi triển khai hệ thống tổng thể?', true, state.data.mucTieuToanDien || '') +
        btnRow('← Quay lại', 'Gửi khảo sát 🚀', true);
    }

    function renderBranchCRM() {
      return '<div class="branch-tag">💼 CRM</div>' +
        sectionHeader('4', 'Hệ thống CRM', 'Khảo sát chuyên sâu về quản lý khách hàng & bán hàng') +
        radioField('quanLyKhachHang', 'Cách quản lý dữ liệu khách hàng hiện tại?', true, ['Excel', 'Facebook/Zalo', 'Phần mềm khác', 'Nhân viên tự quản', 'Mục khác'], state.data.quanLyKhachHang || '') +
        otherField('quanLyKhachHang', 'Cách quản lý khác', state.data.quanLyKhachHangKhac || '') +
        checkboxField('vanDeKhau', 'Vấn đề lớn ở khâu nào?', true, ['Mất Lead', 'Không theo dõi được tiến độ', 'Không đo lường hiệu quả sales', 'Chăm sóc sau bán kém', 'Quy trình lộn xộn', 'Mục khác'], state.data.vanDeKhau || []) +
        otherField('vanDeKhau', 'Vấn đề khác', state.data.vanDeKhauKhac || '') +
        radioField('soNhanSuSales', 'Số lượng nhân sự Sales?', true, ['1 - 4', '5 - 10', 'Trên 10'], state.data.soNhanSuSales || '') +
        radioField('quyTrinhBanHang', 'Quy trình bán hàng đã chuẩn hóa chưa?', true, ['Chưa có', 'Có nhưng mỗi người làm mỗi kiểu', 'Có nhưng chưa đo lường được'], state.data.quyTrinhBanHang || '') +
        radioField('chiSoCaiThien', 'Chỉ số muốn cải thiện nhất?', true, ['Số lượng Lead', 'Tỷ lệ chốt deal', 'Tốc độ phản hồi', 'Doanh thu từ khách cũ', 'Mục khác'], state.data.chiSoCaiThien || '') +
        otherField('chiSoCaiThien', 'Chỉ số khác', state.data.chiSoKhac || '') +
        btnRow('← Quay lại', 'Gửi khảo sát 🚀', true);
    }

    function renderBranchTask() {
      return '<div class="branch-tag">📋 Task Management</div>' +
        sectionHeader('4', 'Quản trị công việc & Quy trình', 'Khảo sát chuyên sâu về quản lý công việc nội bộ') +
        checkboxField('giaoViecHienTai', 'Cách giao việc hiện tại?', true, ['Zalo', 'Excel', 'Email', 'Khác'], state.data.giaoViecHienTai || []) +
        otherField('giaoViecHienTai', 'Cách giao việc khác', state.data.giaoViecKhac || '') +
        radioField('vanDeGiaoViec', 'Vấn đề khi giao việc?', false, ['Không kiểm soát tiến độ', 'Quên việc/trễ deadline', 'Thiếu minh bạch', 'Báo cáo thủ công', 'Mục khác'], state.data.vanDeGiaoViec || '') +
        radioField('soCapQuanLy', 'Số cấp quản lý cần theo dõi?', false, ['1 cấp', '2 cấp', 'Trên 2 cấp'], state.data.soCapQuanLy || '') +
        textField('kyVongQuanLyCongViec', 'Kỳ vọng lớn nhất khi áp dụng quản lý công việc?', true, state.data.kyVongQuanLyCongViec || '') +
        btnRow('← Quay lại', 'Gửi khảo sát 🚀', true);
    }

    function renderSuccess() {
      var name = (state.data.danhXung || '') + ' ' + (state.data.hoTen || '');
      return '<div class="success-wrap">' +
        '<div class="success-icon">🎉</div>' +
        '<div class="success-title">Cảm ơn ' + name.trim() + ' đã hoàn thành khảo sát!</div>' +
        '<div class="success-desc">Hệ thống SYNITY đã nhận được thông tin khảo sát của ' + (state.data.danhXung || '') + '.<br>Đội ngũ SYNITY sẽ liên hệ trong vòng <strong>24h</strong> để tư vấn và sắp xếp demo giải pháp phù hợp.<br><br>Trong thời gian chờ đợi, hãy theo dõi <a href="https://www.facebook.com/dangdinhchinh" target="_blank" style="color:var(--primary-light);text-decoration:none;font-weight:600;">Facebook Chinh Dang</a> để cập nhật các kiến thức chuyển đổi số mới nhất!</div>' +
        '</div>';
    }

    // ---- FIELD BUILDERS ----
    function textField(name, label, required, value, type, hint) {
      type = type || 'text';
      return '<div class="field" id="f_' + name + '">' +
        '<label class="field-label">' + label + (required ? '<span class="required">*</span>' : '') + '</label>' +
        '<input type="' + type + '" id="' + name + '" value="' + esc(value) + '" placeholder="Nhập ' + label.toLowerCase() + '">' +
        (hint ? '<div class="field-hint">' + hint + '</div>' : '') +
        '<div class="field-error" id="err_' + name + '">Vui lòng điền thông tin này</div>' +
        '</div>';
    }
    function textareaField(name, label, required, value, placeholder) {
      return '<div class="field" id="f_' + name + '">' +
        '<label class="field-label">' + label + (required ? '<span class="required">*</span>' : '') + '</label>' +
        '<textarea id="' + name + '" placeholder="' + esc(placeholder || 'Nhập câu trả lời của bạn...') + '">' + esc(value) + '</textarea>' +
        '<div class="field-error" id="err_' + name + '">Vui lòng điền thông tin này</div>' +
        '</div>';
    }
    function selectField(name, label, required, options, value) {
      var opts = '<option value="">-- Chọn --</option>';
      options.forEach(function (o) { opts += '<option value="' + esc(o) + '"' + (o === value ? ' selected' : '') + '>' + o + '</option>'; });
      return '<div class="field" id="f_' + name + '">' +
        '<label class="field-label">' + label + (required ? '<span class="required">*</span>' : '') + '</label>' +
        '<select id="' + name + '">' + opts + '</select>' +
        '<div class="field-error" id="err_' + name + '">Vui lòng chọn một mục</div>' +
        '</div>';
    }
    function radioField(name, label, required, options, value) {
      var items = '';
      options.forEach(function (o) {
        var sel = o === value ? ' selected' : '';
        items += '<label class="option-item' + sel + '" onclick="selectOption(event,this,\'' + name + '\',false)">' +
          '<input type="radio" name="' + name + '" value="' + esc(o) + '"' + (o === value ? ' checked' : '') + '>' +
          '<span class="dot"></span>' + o + '</label>';
      });
      return '<div class="field" id="f_' + name + '">' +
        '<label class="field-label">' + label + (required ? '<span class="required">*</span>' : '') + '</label>' +
        '<div class="options-list">' + items + '</div>' +
        '<div class="field-error" id="err_' + name + '">Vui lòng chọn một mục</div>' +
        '</div>';
    }
    function checkboxField(name, label, required, options, values) {
      var items = '';
      options.forEach(function (o) {
        var sel = values.indexOf(o) !== -1 ? ' selected' : '';
        items += '<label class="option-item' + sel + '" onclick="selectOption(event,this,\'' + name + '\',true)">' +
          '<input type="checkbox" name="' + name + '" value="' + esc(o) + '"' + (values.indexOf(o) !== -1 ? ' checked' : '') + '>' +
          '<span class="dot"></span>' + o + '</label>';
      });
      return '<div class="field" id="f_' + name + '">' +
        '<label class="field-label">' + label + (required ? '<span class="required">*</span>' : '') + '</label>' +
        '<div class="options-list">' + items + '</div>' +
        '<div class="field-error" id="err_' + name + '">Vui lòng chọn ít nhất một mục</div>' +
        '</div>';
    }
    function otherField(parentName, label, value) {
      return '<div class="other-input-wrap" id="wrap_other_' + parentName + '">' +
        '<input type="text" id="other_' + parentName + '" value="' + esc(value) + '" placeholder="' + label + '...">' +
        '</div>';
    }
    function fieldsRow(f1, f2) { return '<div class="fields-row">' + f1 + f2 + '</div>'; }
    function sectionHeader(num, title, desc) {
      return '<div class="section-title"><span class="step-num">' + num + '</span>' + title + '</div>' +
        '<div class="section-desc">' + desc + '</div>';
    }
    function btnRow(back, next, hasNext) {
      var backBtn = back ? '<button class="btn btn-secondary" onclick="prevStep()">' + back + '</button>' : '<div></div>';
      var nextBtn = hasNext ? '<button class="btn btn-primary" id="nextBtn" onclick="nextStep()">' + next + '</button>' : '';
      return '<div class="btn-row">' + backBtn + nextBtn + '</div>';
    }
    function esc(s) { return String(s || '').replace(/&/g, '&amp;').replace(/"/g, '&quot;').replace(/</g, '&lt;').replace(/>/g, '&gt;'); }

    // ---- OPTION TOGGLE ----
    function selectOption(e, el, name, isCheckbox) {
      if (isCheckbox) {
        e.preventDefault();
        el.classList.toggle('selected');
        var input = el.querySelector('input');
        input.checked = !input.checked;
      } else {
        var all = el.parentElement.querySelectorAll('.option-item');
        all.forEach(function (a) { a.classList.remove('selected'); a.querySelector('input').checked = false; });
        el.classList.add('selected');
        el.querySelector('input').checked = true;
      }
      checkOther(name);
    }
    function checkOther(name) {
      var wrap = document.getElementById('wrap_other_' + name);
      if (!wrap) return;
      var inputs = document.querySelectorAll('[name="' + name + '"]:checked');
      var hasOther = false;
      inputs.forEach(function (i) { if (i.value.indexOf('Mục khác') !== -1 || i.value.indexOf('Khác') !== -1) hasOther = true; });
      wrap.classList.toggle('show', hasOther);
    }
    function attachListeners() {
      ['bietDen', 'khoKhan', 'giaiPhapQuanTam', 'boPhanSoHoa', 'kyVongThayDoi', 'quanLyKhachHang', 'vanDeKhau', 'chiSoCaiThien', 'giaoViecHienTai'].forEach(checkOther);
    }

    // ---- COLLECT & VALIDATE ----
    function collect() {
      var d = state.data;
      function g(id) { var el = document.getElementById(id); return el ? el.value.trim() : ''; }
      function gChecked(name) { var vals = []; document.querySelectorAll('[name="' + name + '"]:checked').forEach(function (i) { vals.push(i.value); }); return vals; }
      if (state.step === 1) { d.hoTen = g('hoTen'); d.danhXung = g('danhXung'); d.email = g('email'); d.phone = g('phone'); d.facebook = g('facebook'); d.vaiTro = g('vaiTro'); d.bietDen = gChecked('bietDen')[0] || ''; d.bietDenKhac = g('other_bietDen'); }
      if (state.step === 2) { d.tenDN = g('tenDN'); d.maSoThue = g('maSoThue'); d.website = g('website'); d.soNhanSu = g('soNhanSu'); d.nganhNghe = g('nganhNghe'); d.doanhThu = g('doanhThu'); }
      if (state.step === 3) { d.khoKhan = gChecked('khoKhan'); d.khoKhanKhac = g('other_khoKhan'); d.vanDeCapBach = g('vanDeCapBach'); d.congCuHienTai = g('congCuHienTai'); d.haiLong = g('haiLong'); d.chuaHaiLong = g('chuaHaiLong'); d.kyVong = g('kyVong'); d.tieuChi = g('tieuChi'); d.giaiPhapQuanTam = gChecked('giaiPhapQuanTam'); d.giaiPhapKhac = g('other_giaiPhapQuanTam'); d.nhomGiaiPhap = gChecked('nhomGiaiPhap')[0] || ''; }
      if (state.step === 4) {
        if (state.branch === 'full') { d.boPhanSoHoa = gChecked('boPhanSoHoa'); d.boPhanKhac = g('other_boPhanSoHoa'); d.quyTrinhChuan = gChecked('quyTrinhChuan')[0] || ''; d.sanSangThayDoi = gChecked('sanSangThayDoi')[0] || ''; d.kyVongThayDoi = gChecked('kyVongThayDoi')[0] || ''; d.kyVongThayDoiKhac = g('other_kyVongThayDoi'); d.mucTieuToanDien = g('mucTieuToanDien'); }
        else if (state.branch === 'crm') { d.quanLyKhachHang = gChecked('quanLyKhachHang')[0] || ''; d.quanLyKhachHangKhac = g('other_quanLyKhachHang'); d.vanDeKhau = gChecked('vanDeKhau'); d.vanDeKhauKhac = g('other_vanDeKhau'); d.soNhanSuSales = gChecked('soNhanSuSales')[0] || ''; d.quyTrinhBanHang = gChecked('quyTrinhBanHang')[0] || ''; d.chiSoCaiThien = gChecked('chiSoCaiThien')[0] || ''; d.chiSoKhac = g('other_chiSoCaiThien'); }
        else if (state.branch === 'task') { d.giaoViecHienTai = gChecked('giaoViecHienTai'); d.giaoViecKhac = g('other_giaoViecHienTai'); d.vanDeGiaoViec = gChecked('vanDeGiaoViec')[0] || ''; d.soCapQuanLy = gChecked('soCapQuanLy')[0] || ''; d.kyVongQuanLyCongViec = g('kyVongQuanLyCongViec'); }
      }
    }

    function validate() {
      var errors = []; var d = state.data;
      function err(id, msg) { var el = document.getElementById(id); var errEl = document.getElementById('err_' + id); if (el) el.classList.add('error'); if (errEl) { errEl.textContent = msg || 'Vui lòng điền thông tin này'; errEl.classList.add('show'); } errors.push(id); }
      function clearErr(id) { var el = document.getElementById(id); var errEl = document.getElementById('err_' + id); if (el) el.classList.remove('error'); if (errEl) errEl.classList.remove('show'); }
      if (state.step === 1) { ['hoTen', 'danhXung', 'email', 'phone', 'vaiTro', 'bietDen'].forEach(clearErr); if (!d.hoTen) err('hoTen'); if (!d.danhXung) err('danhXung'); if (!d.email || !d.email.match(/.+@.+\..+/)) err('email', 'Email không hợp lệ'); if (!d.phone) err('phone'); if (!d.vaiTro) err('vaiTro'); if (!d.bietDen) err('bietDen', 'Vui lòng chọn một mục'); }
      if (state.step === 2) { ['maSoThue', 'soNhanSu', 'nganhNghe', 'doanhThu'].forEach(clearErr); if (!d.maSoThue) err('maSoThue'); else if (!/^[0-9][0-9\-]*[0-9]$/.test(d.maSoThue) && !/^[0-9]+$/.test(d.maSoThue)) err('maSoThue', 'Mã số thuế chỉ gồm chữ số và dấu gạch ngang (VD: 0123456789 hoặc 986897-33)'); if (!d.soNhanSu) err('soNhanSu'); if (!d.nganhNghe) err('nganhNghe'); if (!d.doanhThu) err('doanhThu'); else if (!/^[0-9]+([.,][0-9]+)?$/.test(d.doanhThu.trim())) err('doanhThu', 'Vui lòng nhập số (VD: 25 hoặc 25.5 hoặc 25,5)'); }
      if (state.step === 3) { ['khoKhan', 'vanDeCapBach', 'congCuHienTai', 'haiLong', 'chuaHaiLong', 'kyVong', 'tieuChi', 'nhomGiaiPhap'].forEach(clearErr); if (!d.khoKhan || d.khoKhan.length === 0) err('khoKhan', 'Vui lòng chọn ít nhất một mục'); if (!d.vanDeCapBach) err('vanDeCapBach'); if (!d.congCuHienTai) err('congCuHienTai'); if (!d.haiLong) err('haiLong'); if (!d.chuaHaiLong) err('chuaHaiLong'); if (!d.kyVong) err('kyVong'); if (!d.tieuChi) err('tieuChi'); if (!d.nhomGiaiPhap) err('nhomGiaiPhap', 'Vui lòng chọn nhóm giải pháp'); }
      if (state.step === 4) {
        if (state.branch === 'full') { ['boPhanSoHoa', 'quyTrinhChuan', 'sanSangThayDoi', 'kyVongThayDoi', 'mucTieuToanDien'].forEach(clearErr); if (!d.boPhanSoHoa || d.boPhanSoHoa.length === 0) err('boPhanSoHoa', 'Vui lòng chọn ít nhất một mục'); if (!d.quyTrinhChuan) err('quyTrinhChuan', 'Vui lòng chọn một mục'); if (!d.sanSangThayDoi) err('sanSangThayDoi', 'Vui lòng chọn một mục'); if (!d.kyVongThayDoi) err('kyVongThayDoi', 'Vui lòng chọn một mục'); if (!d.mucTieuToanDien) err('mucTieuToanDien'); }
        else if (state.branch === 'crm') { ['quanLyKhachHang', 'vanDeKhau', 'soNhanSuSales', 'quyTrinhBanHang', 'chiSoCaiThien'].forEach(clearErr); if (!d.quanLyKhachHang) err('quanLyKhachHang', 'Vui lòng chọn một mục'); if (!d.vanDeKhau || d.vanDeKhau.length === 0) err('vanDeKhau', 'Vui lòng chọn ít nhất một mục'); if (!d.soNhanSuSales) err('soNhanSuSales', 'Vui lòng chọn một mục'); if (!d.quyTrinhBanHang) err('quyTrinhBanHang', 'Vui lòng chọn một mục'); if (!d.chiSoCaiThien) err('chiSoCaiThien', 'Vui lòng chọn một mục'); }
        else if (state.branch === 'task') { ['giaoViecHienTai', 'kyVongQuanLyCongViec'].forEach(clearErr); if (!d.giaoViecHienTai || d.giaoViecHienTai.length === 0) err('giaoViecHienTai', 'Vui lòng chọn ít nhất một mục'); if (!d.kyVongQuanLyCongViec) err('kyVongQuanLyCongViec'); }
      }
      if (errors.length > 0) { var firstEl = document.getElementById(errors[0]); if (firstEl) firstEl.scrollIntoView({ behavior: 'smooth', block: 'center' }); }
      return errors.length === 0;
    }

    // ---- NAVIGATION ----
    function nextStep() {
      if (state.step === 0) { state.step = 1; render(); return; }
      collect();
      if (!validate()) return;
      if (state.step === 4) { submitData(); return; }
      state.step++;
      render();
    }
    function prevStep() { collect(); state.step--; render(); }

    // ---- SUBMIT via fetch (no-cors + URLSearchParams) ----
    function submitData() {
      var btn = document.getElementById('nextBtn');
      if (btn) { btn.disabled = true; btn.innerHTML = '<span class="loading-spin"></span> Đang gửi...'; }

      // URLSearchParams → Content-Type: application/x-www-form-urlencoded
      // → "simple" request, không cần preflight CORS
      // mode: 'no-cors' → browser gửi request, response opaque (không đọc được) nhưng Apps Script VẪN nhận và ghi Sheet
      var params = new URLSearchParams();
      params.append('data', JSON.stringify(state.data));

      fetch(APPS_SCRIPT_URL, {
        method: 'POST',
        body: params,
        mode: 'no-cors',
        redirect: 'follow'
      })
        .then(function () {
          state.step = 5;
          render();
        })
        .catch(function () {
          // Network error thật sự
          if (btn) { btn.disabled = false; btn.innerHTML = 'Gửi khảo sát 🚀'; }
          alert('Lỗi kết nối. Vui lòng kiểm tra URL Apps Script và thử lại.');
        });
    }


    render();
  </script>
</body>
